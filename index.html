<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nafeesa ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
font-family:Poppins;
color:white;
overflow:hidden;
}

/* Card */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(255,105,180,0.4);
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4e8a;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

/* Cake Scene */
#scene{display:none; position:relative;}

.cake{
font-size:120px;
animation: float 3s infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* Text */
.message{
font-size:28px;
color:#ffb6c1;
margin-top:20px;
text-shadow:0 0 20px hotpink;
}

/* Small Fireworks ONLY above cake */
.firework{
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
font-size:40px;
animation: boom 0.8s ease-out infinite;
}

@keyframes boom{
0%{opacity:1; transform:translate(-50%,0) scale(0.5);}
100%{opacity:0; transform:translate(-50%,-120px) scale(1.5);}
}
</style>
</head>

<body>

<div class="card" id="main">
<h1>Nafeesa i love you so much ummmmmmmmmmmmmmmmmmmhhhhhh💖</h1>
<h2>Tap For Surprise 🎁</h2>
<button onclick="openGift()">Open ❤️</button>

<div id="scene">
<div class="cake">🎂</div>

<div class="firework">✨</div>
<div class="firework" style="left:30%;">💖</div>
<div class="firework" style="left:70%;">✨</div>

<div class="message">
Nafeesa mere jan ka tota Happy Birthday ❤️
</div>
</div>
</div>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_9a1c8dbb58.mp3" loop></audio>

<script>
function openGift(){
document.getElementById("scene").style.display="block";
document.getElementById("music").play();

/* Fireworks remove after 3 sec */
setTimeout(()=>{
document.querySelectorAll(".firework").forEach(e=>e.style.display="none");
},3000);
}
</script>

</body>
</html>
